<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 290px;
  --accent: #4a6fa5;
  --accent-hover: #3d5d8a;
  --accent-light: #e8eef7;
  --bg: #ffffff;
  --bg-sidebar: #f5f6f7;
  --bg-ctrl: #ffffff;
  --bg-hover: rgba(0,0,0,0.04);
  --bg-code: #f6f8fa;
  --bg-alt: #fafbfc;
  --border: #e1e4e8;
  --text: #24292e;
  --text-muted: #6a737d;
  --danger: #cb2431;
  --danger-bg: #ffeef0;
  --green: #2ea043;
  --green-bg: #edfbf3;
  --group-a: #2ea043;
  --group-a-bg: #edfbf3;
  --group-b: #6f42c1;
  --group-b-bg: #f0ecfd;
}
html[data-theme="sepia"] {
  --bg: #f9f5ef; --bg-sidebar: #ede8e0; --bg-ctrl: #f9f5ef;
  --bg-hover: rgba(0,0,0,0.04); --bg-code: #e8e2d8; --bg-alt: #f2ece3;
  --border: #d5cdc0; --text: #3b2f1e; --text-muted: #7d6e5a;
  --accent: #7a5c2e; --accent-hover: #614a24; --accent-light: #ecdfc9;
  --group-a: #5a7a2e; --group-a-bg: #edf2d5;
  --group-b: #7a4a7a; --group-b-bg: #f2e5f2;
}
html[data-theme="dusk"] {
  --bg: #1e2233; --bg-sidebar: #171b2b; --bg-ctrl: #252a3d;
  --bg-hover: rgba(255,255,255,0.05); --bg-code: #2a2f45; --bg-alt: #232840;
  --border: #343a54; --text: #d0d4e8; --text-muted: #7e86a8;
  --accent: #7b9fd4; --accent-hover: #9ab6e2; --accent-light: #2a3354;
  --group-a: #5cb87a; --group-a-bg: #1e3028;
  --group-b: #a78be0; --group-b-bg: #2d2544;
}
html[data-theme="dark"] {
  --bg: #1a1b1e; --bg-sidebar: #131416; --bg-ctrl: #22252a;
  --bg-hover: rgba(255,255,255,0.05); --bg-code: #2a2d35; --bg-alt: #1f2228;
  --border: #30363d; --text: #e1e4e8; --text-muted: #8b949e;
  --accent: #5c8dd4; --accent-hover: #79a3e0; --accent-light: #1c2a3f;
  --group-a: #3fb950; --group-a-bg: #1b2f1e;
  --group-b: #a371f7; --group-b-bg: #2a1f3a;
}

html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); }

#app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar { display: flex; flex-direction: column; background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow: hidden; }

#sidebar-hdr { display: flex; align-items: center; gap: 6px; padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#app-name { font-weight: 700; font-size: 13px; letter-spacing: 0.02em; flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#save-status { font-size: 11px; padding: 2px 7px; border-radius: 10px; white-space: nowrap; background: var(--bg-ctrl); border: 1px solid var(--border); color: var(--text-muted); }
#save-status.dirty { background: #fff3cd; border-color: #ffc107; color: #856404; }
html[data-theme="dark"] #save-status.dirty, html[data-theme="dusk"] #save-status.dirty { background: #3d3000; border-color: #8b6914; color: #ffc107; }
#save-status.saving { color: var(--accent); }
#save-status.saved { background: var(--green-bg); border-color: var(--green); color: var(--green); }

// ── Helpers ────────────────────────────────────────────────────────────────────

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// Format a YYYY-MM or YYYY-MM-DD string as "Jul 2024" or "15 Jul 2024"
function fmtDate(iso) {
  if (!iso) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const full = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (full) {
    const [, y, m, d] = full.map(Number);
    return d + ' ' + (months[m - 1] || '?') + ' ' + y;
  }
  const ym = iso.slice(0, 7);
  const [y, m] = ym.split('-').map(Number);
  if (!y || !m) return iso;
  return (months[m - 1] || '?') + ' ' + y;
}

// Return today as YYYY-MM-DD
function currentMonth() {
  return new Date().toISOString().slice(0, 10);
}

function slug(str) {
  return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
}

// Add 3 years to a YYYY-MM string
function addThreeYears(ym) {
  if (!ym) return '';
  const [y, m] = ym.split('-').map(Number);
  // Subtract one month so "Jul 2024" cycle ends "Jun 2027"
  let endY = y + 3, endM = m - 1;
  if (endM === 0) { endM = 12; endY--; }
  return endY + '-' + String(endM).padStart(2, '0');
}

function getStats() {
  const entries  = data.entries;
  const settings = data.settings;
  const cycleStart = settings.cycleStart || '';
  const cycleEnd   = addThreeYears(cycleStart);

  let totalA = 0, totalB = 0, transcribed = 0;
  const domainCounts = {};
  DOMAINS.forEach(d => domainCounts[d.id] = 0);

  entries.forEach(e => {
    const t = CPE_TYPES[e.type];
    const n = parseFloat(e.cpeCount) || 0;
    if (t && t.group === 'A') totalA += n;
    if (t && t.group === 'B') totalB += n;
    if (e.transcript) transcribed++;
    (e.domains || []).forEach(d => {
      if (domainCounts[d] !== undefined) domainCounts[d] += n;
    });
  });

  const groupBMax    = settings.groupBMax || 30;
  const groupBCapped = Math.min(totalB, groupBMax);
  const total = totalA + groupBCapped;
  const goal  = settings.cpeGoal || 120;

  return { totalA, totalB, groupBCapped, groupBMax, total, goal, transcribed, domainCounts, cycleStart, cycleEnd };
}

// ── Data persistence ──────────────────────────────────────────────────────────

function serializeData() {
  // Escape <\/script sequences so the HTML parser won't close the script tag early
  return JSON.stringify(data, null, 2).replace(/<\/script/gi, '<\\/script');
}

function saveToLocalStorage() {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function migrateEntry(e) {
  if (e.proofRef && !e.proofRefs) {
    e.proofRefs = e.proofRef ? [e.proofRef] : [];
    delete e.proofRef;
  }
  if (!e.proofRefs) e.proofRefs = [];
  if (e.type && !CPE_TYPES[e.type] && TYPE_MIGRATION[e.type]) e.type = TYPE_MIGRATION[e.type];
  return e;
}

function migrateSettings(s) {
  if (s.cycleStart && s.cycleStart.length > 7) s.cycleStart = s.cycleStart.slice(0, 7);
  return s;
}

function loadData() {
  // 1. Try embedded JSON
  const el = document.getElementById('tiddlers-data');
  let raw = el ? el.textContent.trim() : '';
  if (raw && raw !== '{}' && raw.length > 2) {
    try {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.entries) {
        data = parsed;
        data.entries  = data.entries.map(migrateEntry);
        data.settings = migrateSettings(data.settings || {});
        return;
      }
    } catch(e) { /* fall through */ }
  }
  // 2. Try localStorage
  const ls = localStorage.getItem(LS_KEY);
  if (ls) {
    try {
      const parsed = JSON.parse(ls);
      if (parsed && parsed.entries) {
        data = parsed;
        data.entries  = data.entries.map(migrateEntry);
        data.settings = migrateSettings(data.settings || {});
        return;
      }
    } catch(e) { /* fall through */ }
  }
  // 3. Defaults
  data = { entries: [], settings: { cycleStart: '', cpeGoal: 120, groupBMax: 30 } };
}

// ── File save ─────────────────────────────────────────────────────────────────

async function cacheOriginalHtml() {
  try {
    const res = await fetch(location.href, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch failed');
    originalHtml = await res.text();
  } catch(e) {
    originalHtml = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  }
}

function buildUpdatedHtml() {
  const html = originalHtml;
  if (!html) throw new Error('Original HTML not cached yet. Try again in a moment.');
  const marker   = '<script id="tiddlers-data"';
  const start    = html.indexOf(marker);
  if (start === -1) throw new Error('tiddlers-data marker not found in cached HTML.');
  const tagEnd   = html.indexOf('>', start) + 1;
  const closeTag = '<' + '/script>';
  const closeIdx = html.indexOf(closeTag, tagEnd);
  if (closeIdx === -1) throw new Error('Could not find closing tag for tiddlers-data.');
  return html.slice(0, tagEnd) + '\n' + serializeData() + '\n' + html.slice(closeIdx);
}

function setSaveStatus(state) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.className = '';
  if (state === 'dirty')       { el.textContent = 'Unsaved'; el.className = 'dirty'; isDirty = true; }
  else if (state === 'saving') { el.textContent = 'Saving\u2026'; el.className = 'saving'; }
  else if (state === 'saved')  { el.textContent = 'Saved'; el.className = 'saved'; isDirty = false;
    setTimeout(() => { const e = document.getElementById('save-status'); if (e && e.className==='saved') { e.textContent='Saved'; e.className=''; } }, 2500);
  }
  else if (state === 'downloaded') { el.textContent = 'Downloaded'; el.className = 'saved'; isDirty = false;
    setTimeout(() => { const e = document.getElementById('save-status'); if (e && e.className==='saved') { e.textContent='Saved'; e.className=''; } }, 2500);
  }
  else if (state === 'error')  { el.textContent = 'Error'; el.className = 'error'; }
  else { el.textContent = 'Saved'; el.className = ''; isDirty = false; }
}

async function saveFile() {
  setSaveStatus('saving');
  try {
    const html = buildUpdatedHtml();
    if (!fileHandle) {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: location.pathname.split('/').pop() || 'cpe-tracker.html',
        types: [{ description: 'HTML file', accept: { 'text/html': ['.html'] } }]
      });
    }
    const writable = await fileHandle.createWritable();
    await writable.write(html);
    await writable.close();
    originalHtml = html;
    const domEl = document.getElementById('tiddlers-data');
    if (domEl) domEl.textContent = '\n' + serializeData() + '\n';
    setSaveStatus('saved');
  } catch(e) {
    if (e && e.name === 'AbortError') setSaveStatus('idle');
    else { setSaveStatus('error'); console.error(e); }
  }
}

function triggerFallbackDownload() {
  setSaveStatus('saving');
  try {
    const html = buildUpdatedHtml();
    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = location.pathname.split('/').pop() || 'cpe-tracker.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    setSaveStatus('downloaded');
  } catch(e) { setSaveStatus('error'); console.error(e); }
}

async function saveOrDownload() {
  if (editMode && !collectFormAndSave(false)) return;
  if (typeof window.showSaveFilePicker === 'function') {
    await saveFile();
  } else {
    triggerFallbackDownload();
  }
}

// ── Proof files ───────────────────────────────────────────────────────────────

async function saveProofBlob(blob, suggestedName) {
  if (typeof window.showSaveFilePicker === 'function') {
    const ext = suggestedName.split('.').pop();
    try {
      const startIn = fileHandle || proofDirHandle;
      const fh = await window.showSaveFilePicker({
        suggestedName: suggestedName,
        types: [{ description: 'Proof file', accept: { '*/*': ['.' + ext] } }],
        ...(startIn ? { startIn } : {})
      });
      proofDirHandle = fh;
      const writable = await fh.createWritable();
      await writable.write(blob);
      await writable.close();
      return fh.name || suggestedName;
    } catch(e) {
      if (e && e.name === 'AbortError') return null;
      throw e;
    }
  } else {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = suggestedName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    return suggestedName;
  }
}

function proofSuggestedName(entry, file) {
  const ext = file.name ? file.name.split('.').pop() : (file.type.split('/')[1] || 'bin');
  const datePart = (entry.dateFrom || currentMonth()).slice(0, 7).replace('-', '-');
  const typePart = entry.type || 'cpe';
  const titlePart = slug(entry.title || 'untitled');
  return 'cpe-' + datePart + '-' + typePart + '-' + titlePart + '.' + ext;
}

async function attachProofFile(entry) {
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept = 'image/*,.pdf,.doc,.docx,.txt';
  input.multiple = true;
  input.onchange = async () => {
    for (const file of Array.from(input.files)) {
      const name = proofSuggestedName(entry, file);
      try {
        const saved = await saveProofBlob(file, name);
        if (saved) addProofRef(saved);
      } catch(e) { console.error(e); }
    }
  };
  input.click();
}

// Handle paste event: capture image(s) from clipboard
async function handlePaste(e) {
  if (!editMode) return;
  const items = (e.clipboardData || {}).items;
  if (!items) return;
  let handled = false;
  for (const item of Array.from(items)) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      handled = true;
      const file    = item.getAsFile();
      if (!file) continue;
      const entry   = collectFormData();
      const name    = proofSuggestedName(entry, file);
      try {
        const saved = await saveProofBlob(file, name);
        if (saved) addProofRef(saved);
      } catch(err) { console.error(err); }
    }
  }
}

function addProofRef(name) {
  // Add to the live hidden list in the form
  const listEl = document.getElementById('proof-refs-list');
  if (!listEl) return;
  const existing = Array.from(listEl.querySelectorAll('.proof-ref-item')).map(el => el.dataset.name);
  if (existing.includes(name)) return;
  const item = document.createElement('span');
  item.className = 'proof-ref-item has-file';
  item.dataset.name = name;
  item.innerHTML = escHtml(name) + ' <button class="proof-ref-remove" title="Remove">\u00d7</button>';
  item.querySelector('.proof-ref-remove').addEventListener('click', () => {
    item.remove();
    updateProofRefsHidden();
  });
  listEl.appendChild(item);
  updateProofRefsHidden();
}

function updateProofRefsHidden() {
  const listEl   = document.getElementById('proof-refs-list');
  const hiddenEl = document.getElementById('proof-refs-hidden');
  if (!listEl || !hiddenEl) return;
  const names = Array.from(listEl.querySelectorAll('.proof-ref-item')).map(el => el.dataset.name);
  hiddenEl.value = JSON.stringify(names);
}

// ── CSV helpers ───────────────────────────────────────────────────────────────

function parseCsvLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cols.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  cols.push(cur);
  return cols.map(s => s.trim());
}

function parseCsv(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim());
  if (!lines.length) return { headers: [], rows: [] };
  const headers = parseCsvLine(lines[0]);
  const rows    = lines.slice(1).map(l => parseCsvLine(l));
  return { headers, rows };
}

function autoDetectMappings(headers) {
  const h = headers.map(s => s.toLowerCase().replace(/[\s_-]+/g, ''));
  const find = (...terms) => {
    for (const t of terms) { const i = h.findIndex(x => x.includes(t)); if (i >= 0) return i; }
    return -1;
  };
  return {
    title:      find('title', 'activity', 'name', 'description'),
    dateFrom:   find('date', 'activitydate', 'completiondate', 'startdate'),
    dateTo:     find('enddate', 'dateto'),
    cpeCount:   find('credit', 'cpe', 'hours', 'points'),
    type:       find('type', 'category', 'activitytype'),
    presenter:  find('presenter', 'instructor', 'speaker', 'author'),
    org:        find('organization', 'provider', 'sponsor', 'company'),
    transcript: find('status', 'submitted', 'transcript'),
    summary:    find('summary', 'description', 'notes'),
  };
}

function mapCsvType(raw) {
  if (!raw) return 'online_webinar';
  const r = raw.toLowerCase();
  if (r.includes('webinar') || r.includes('podcast') || r.includes('online')) return 'online_webinar';
  if (r.includes('vendor'))                                                    return 'vendor_presentation';
  if (r.includes('conference'))                                                return 'industry_conf';
  if (r.includes('seminar') || r.includes('courses'))                         return 'courses_seminars';
  if (r.includes('isc') && r.includes('cert'))                                return 'isc2_cert_course';
  if (r.includes('isc'))                                                       return 'isc2_ce_course';
  if (r.includes('book') || r.includes('magazine') || r.includes('study'))    return 'book_magazine';
  if (r.includes('work') || r.includes('experience'))                         return 'unique_work_exp';
  if (r.includes('education') || r.includes('college') || r.includes('university')) return 'higher_education';
  if (r.includes('writing') || r.includes('author') || r.includes('research'))return 'writing_research';
  if (r.includes('instructor') || r.includes('teach') || r.includes('present'))return 'prep_presentation';
  if (r.includes('volunteer'))                                                 return 'gov_committees';
  return 'online_webinar';
}

function parseDateToMonth(raw) {
  if (!raw) return '';
  const isoFull = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoFull) return isoFull[1] + '-' + isoFull[2] + '-' + isoFull[3];
  const isoMatch = raw.match(/^(\d{4})-(\d{2})/);
  if (isoMatch) return isoMatch[1] + '-' + isoMatch[2] + '-01';
  const usMatch = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (usMatch) return usMatch[3] + '-' + usMatch[1].padStart(2, '0') + '-' + usMatch[2].padStart(2, '0');
  const euMatch = raw.match(/^(\d{1,2})[-.](\d{1,2})[-.](\d{4})/);
  if (euMatch) return euMatch[3] + '-' + euMatch[2].padStart(2, '0') + '-' + euMatch[1].padStart(2, '0');
  const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',
                  jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  const mMatch = raw.toLowerCase().match(/([a-z]{3})[a-z]*\s+(\d{4})/);
  if (mMatch && months[mMatch[1]]) return mMatch[2] + '-' + months[mMatch[1]];
  return '';
}

// ── PDF helpers ───────────────────────────────────────────────────────────────

async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    s.onerror = () => reject(new Error('Failed to load PDF.js. Check your internet connection.'));
    document.head.appendChild(s);
  });
}

const PDF_MONTHS = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',
                    jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};

// "15-Dec-2025" → "2025-12-15"
function parsePdfDate(str) {
  const m = (str || '').match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if (m) {
    const mo = PDF_MONTHS[m[2].toLowerCase()];
    if (mo) return m[3] + '-' + mo + '-' + m[1].padStart(2, '0');
  }
  return parseDateToMonth(str);
}

// "Jul 1, 2024" → "2024-07"
function parsePdfHeaderDate(str) {
  const m = (str || '').match(/([A-Za-z]{3})[a-z]*\s+\d+,?\s*(\d{4})/);
  if (m && PDF_MONTHS[m[1].toLowerCase()]) return m[2] + '-' + PDF_MONTHS[m[1].toLowerCase()];
  return '';
}

function mapPdfCpeType(typeStr, group) {
  const t = (typeStr || '').toLowerCase();
  if (group === 'B') {
    if (t.includes('education') || t.includes('seminar') || t.includes('courses')) return 'nonsec_education';
    if (t.includes('conference'))                                                   return 'nonsec_conference';
    return 'nonsec_org';
  }
  if (t.includes('isc2') || t.includes('isc\u00b2')) {
    if (t.includes('infosecurity') || t.includes('magazine')) return 'book_magazine';
    return 'isc2_ce_course';
  }
  if (t.includes('digitell'))                                                        return 'online_webinar';
  if (t.includes('knowledge vault'))                                                 return 'book_magazine';
  if (t.includes('online webinar') || t.includes('podcast') || t.includes('online material')) return 'online_webinar';
  if (t.includes('industry conference'))                                             return 'industry_conf';
  if (t.includes('courses and seminars') || t.includes('courses & seminars'))       return 'courses_seminars';
  if (t.includes('vendor presentation'))                                             return 'vendor_presentation';
  if (t.includes('association') && t.includes('meeting'))                           return 'isec_assoc_meeting';
  if (t.includes('writing') || t.includes('author'))                                return 'writing_research';
  if (t.includes('volunteer'))                                                       return 'gov_committees';
  if (t.includes('work experience') || t.includes('employment'))                    return 'unique_work_exp';
  return 'online_webinar';
}

async function parsePdfTranscript(arrayBuffer) {
  const pdfjsLib = await loadPdfJs();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  // Collect all text items across pages with their x/y positions
  const allItems = [];
  let maxPageH = 792;  // US Letter default
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const vp   = page.getViewport({ scale: 1 });
    maxPageH   = Math.max(maxPageH, vp.height);
    const tc   = await page.getTextContent();
    for (const item of tc.items) {
      const text = (item.str || '').trim();
      if (!text) continue;
      allItems.push({ text, x: item.transform[4], y: item.transform[5], page: p, pageH: vp.height });
    }
  }

  // Convert to document-order Y (0=top of page 1, increases downward)
  allItems.forEach(i => { i.docY = (i.page - 1) * maxPageH + (i.pageH - i.y); });

  // Sort top→bottom, left→right within same line
  allItems.sort((a, b) => {
    const dy = a.docY - b.docY;
    return Math.abs(dy) > 3 ? dy : a.x - b.x;
  });

  // Group into lines (items within 4pt vertically)
  const lines = [];
  for (const item of allItems) {
    const last = lines[lines.length - 1];
    if (last && Math.abs(item.docY - last[0].docY) <= 4) last.push(item);
    else lines.push([item]);
  }

  // Auto-detect column positions from the header row
  let dateColX = 55, descColX = 145, typeColX = 345, creditColX = 510;
  for (const line of lines) {
    const full = line.map(i => i.text).join(' ');
    if (full.includes('Activity Date') && full.includes('Activity Description') && full.includes('CPE Type')) {
      for (const item of line) {
        const t = item.text;
        if (t === 'Activity Date' || t === 'Activity')    dateColX   = item.x;
        if (t === 'Activity Description' || t === 'Description') descColX = item.x;
        if (t === 'CPE Type' || t === 'CPE')              typeColX   = item.x;
        if (t === 'Credit')                               creditColX = item.x;
      }
      break;
    }
  }

  const mid1 = (dateColX + descColX) / 2;
  const mid2 = (descColX + typeColX) / 2;
  const mid3 = (typeColX + creditColX) / 2;
  const getCol = x => x < mid1 ? 'date' : x < mid2 ? 'desc' : x < mid3 ? 'type' : 'credit';

  const DATE_RE = /^\d{1,2}-[A-Za-z]{3}-\d{4}$/;

  let currentGroup = 'A';
  let currentEntry = null;
  let cycleStartMonth = '';
  const entries = [];

  for (const line of lines) {
    const lineText = line.map(i => i.text).join(' ');

    // Skip structural lines
    if (/Official CPE Transcript|Activity Date.*Credit|CPE progress|Candidate and Member Services/.test(lineText)) continue;
    if (/^Total Group [AB] Credits/.test(lineText)) {
      if (currentEntry) { entries.push(currentEntry); currentEntry = null; }
      continue;
    }
    if (lineText.includes('Group A Credits')) { currentGroup = 'A'; continue; }
    if (lineText.includes('Group B Credits')) {
      if (currentEntry) { entries.push(currentEntry); currentEntry = null; }
      currentGroup = 'B'; continue;
    }
    if (lineText.includes('Candidate and Member Services') || lineText.includes('625 N Washington')) break;

    // Cycle dates
    const startM = lineText.match(/Start date:\s*(.+)/);
    if (startM) { cycleStartMonth = parsePdfHeaderDate(startM[1]); continue; }
    if (lineText.match(/^End date:|^Member |^Certification awarded|^CPE progress|^190%|^\d+% /)) continue;

    const dateItem = line.find(i => DATE_RE.test(i.text) && getCol(i.x) === 'date');

    if (dateItem) {
      if (currentEntry) entries.push(currentEntry);
      const descText   = line.filter(i => getCol(i.x) === 'desc').map(i => i.text).join(' ');
      const typeText   = line.filter(i => getCol(i.x) === 'type').map(i => i.text).join(' ');
      const creditText = line.filter(i => getCol(i.x) === 'credit').map(i => i.text).join('');
      currentEntry = {
        dateStr: dateItem.text,
        desc:    descText,
        type:    typeText,
        credit:  parseFloat(creditText) || 0,
        group:   currentGroup,
        gotCredit: !!(parseFloat(creditText) || 0),
      };
    } else if (currentEntry) {
      for (const item of line) {
        const col = getCol(item.x);
        if (col === 'desc') currentEntry.desc += ' ' + item.text;
        else if (col === 'type') currentEntry.type += ' ' + item.text;
        else if (col === 'credit' && !currentEntry.gotCredit) {
          const n = parseFloat(item.text);
          if (!isNaN(n) && n > 0) { currentEntry.credit = n; currentEntry.gotCredit = true; }
        }
      }
    }
  }
  if (currentEntry) entries.push(currentEntry);

  return {
    cycleStartMonth,
    entries: entries.map(e => ({
      id:           uid(),
      created:      new Date().toISOString(),
      modified:     new Date().toISOString(),
      title:        e.desc.trim(),
      type:         mapPdfCpeType(e.type.trim(), e.group),
      dateFrom:     parsePdfDate(e.dateStr),
      dateTo:       parsePdfDate(e.dateStr),
      cpeCount:     e.credit,
      presenter:    '',
      org:          '',
      yearPublished:'',
      url:          '',
      summary:      '',
      proofRefs:    [],
      transcript:   true,
      domains:      [],
    })),
  };
}

function showImportModal() {
  const input = document.createElement('input');
  input.type   = 'file';
  input.accept = '.csv,.pdf,text/csv,application/pdf';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();

    if (ext === 'pdf') {
      const loading = document.createElement('div');
      loading.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
        'background:var(--bg-ctrl);border:1px solid var(--border);color:var(--text);' +
        'padding:16px 24px;border-radius:8px;font-size:13px;z-index:300;' +
        'box-shadow:0 4px 16px rgba(0,0,0,0.2);text-align:center';
      loading.innerHTML = '<div style="margin-bottom:6px">Parsing PDF\u2026</div>' +
        '<div style="font-size:11px;color:var(--text-muted)">(loading PDF.js from CDN)</div>';
      document.body.appendChild(loading);
      try {
        const result = await parsePdfTranscript(await file.arrayBuffer());
        loading.remove();
        if (!result.entries.length) {
          alert('No CPE entries found. Make sure this is an ISC\u00b2 CPE transcript PDF.');
          return;
        }
        showPdfImportSummary(result, file.name);
      } catch(e) {
        loading.remove();
        alert('Error reading PDF: ' + e.message);
        console.error(e);
      }
    } else {
      const reader = new FileReader();
      reader.onload = ev => showImportPreview(ev.target.result, file.name);
      reader.readAsText(file);
    }
  };
  input.click();
}

function showPdfImportSummary(result, filename) {
  const { entries: imp, cycleStartMonth } = result;
  const grpA = imp.filter(e => (CPE_TYPES[e.type] || {}).group === 'A').length;
  const grpB = imp.length - grpA;
  const totalCpe = imp.reduce((s, e) => s + (e.cpeCount || 0), 0);

  const overlay = document.createElement('div');
  overlay.className = 'settings-modal-overlay';
  overlay.innerHTML =
    '<div class="settings-modal">' +
      '<h2>Import ISC\u00b2 Transcript</h2>' +
      '<p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">' + escHtml(filename) + '</p>' +
      '<div style="background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px">' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">' +
          '<div><div style="font-size:11px;color:var(--text-muted)">Entries found</div><div style="font-size:22px;font-weight:700;color:var(--accent)">' + imp.length + '</div></div>' +
          '<div><div style="font-size:11px;color:var(--text-muted)">Total CPEs</div><div style="font-size:22px;font-weight:700;color:var(--accent)">' + totalCpe.toFixed(2) + '</div></div>' +
          '<div><div style="font-size:11px;color:var(--group-a);font-weight:600">GROUP A</div><div style="font-weight:600">' + grpA + ' entries</div></div>' +
          '<div><div style="font-size:11px;color:var(--group-b);font-weight:600">GROUP B</div><div style="font-weight:600">' + grpB + ' entries</div></div>' +
        '</div>' +
        (cycleStartMonth
          ? '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)">Cycle start detected: <strong style="color:var(--text)">' + fmtDate(cycleStartMonth) + '</strong></div>'
          : '') +
      '</div>' +
      '<p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">All entries will be marked as <strong>added to transcript</strong>. You can add proof files, domains, and summaries afterwards.</p>' +
      (cycleStartMonth
        ? '<label style="font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:14px;cursor:pointer"><input type="checkbox" id="imp-set-cycle" checked> Set cycle start to ' + fmtDate(cycleStartMonth) + '</label>'
        : '') +
      '<div class="modal-actions">' +
        '<button class="btn" id="pdf-imp-cancel">Cancel</button>' +
        '<button class="btn btn-primary" id="pdf-imp-confirm">Import ' + imp.length + ' entries</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('pdf-imp-cancel').addEventListener('click', () => overlay.remove());
  document.getElementById('pdf-imp-confirm').addEventListener('click', () => {
    const setCycleCb = document.getElementById('imp-set-cycle');
    if (cycleStartMonth && setCycleCb && setCycleCb.checked) {
      data.settings.cycleStart = cycleStartMonth;
    }
    // Skip duplicates (same title + date)
    const seen = new Set(data.entries.map(e => e.title + '\x00' + e.dateFrom));
    const fresh = imp.filter(e => !seen.has(e.title + '\x00' + e.dateFrom));
    const skipped = imp.length - fresh.length;

    data.entries = data.entries.concat(fresh);
    saveToLocalStorage();
    setSaveStatus('dirty');
    overlay.remove();
    renderAll();

    const msg = fresh.length + ' entries imported' + (skipped ? ' \u2014 ' + skipped + ' duplicates skipped' : '');
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;' +
      'padding:8px 18px;border-radius:6px;font-size:13px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.3)';
    notice.textContent = msg;
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 3500);
  });
}

function showImportPreview(csvText, filename) {
  const { headers, rows } = parseCsv(csvText);
  if (!rows.length) { alert('No data rows found in the CSV.'); return; }

  const mappings = autoDetectMappings(headers);
  const colOpts  = (selected) =>
    '<option value="-1">(not mapped)</option>' +
    headers.map((h, i) => '<option value="' + i + '"' + (i === selected ? ' selected' : '') + '>' + escHtml(h) + '</option>').join('');

  const FIELD_LABELS = [
    ['title','Title'],['dateFrom','Date (From)'],['dateTo','Date (To)'],
    ['cpeCount','CPE Credits'],['type','CPE Type'],['presenter','Presenter / Author'],
    ['org','Organization'],['transcript','Status / Transcript'],['summary','Summary'],
  ];

  const mapRows = FIELD_LABELS.map(([key, label]) =>
    '<tr><td style="padding:4px 8px;font-size:12px;color:var(--text-muted)">' + label + '</td>' +
    '<td style="padding:4px 8px"><select class="field-input" style="font-size:12px;padding:3px 5px" data-field="' + key + '">' +
      colOpts(mappings[key]) + '</select></td></tr>'
  ).join('');

  const previewRows = rows.slice(0, 5).map(r =>
    '<tr>' + headers.map((_, i) => '<td style="padding:2px 6px;font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + escHtml(r[i]||'') + '">' + escHtml(r[i]||'') + '</td>').join('') + '</tr>'
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'settings-modal-overlay';
  overlay.style.cssText = 'align-items:flex-start;padding-top:40px';
  overlay.innerHTML =
    '<div class="settings-modal" style="min-width:560px;max-width:700px;max-height:80vh;overflow-y:auto">' +
      '<h2>Import CSV \u2013 ' + escHtml(filename) + '</h2>' +
      '<p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Found <strong>' + rows.length + '</strong> rows. Map columns to CPE fields:</p>' +
      '<table style="width:100%;border-collapse:collapse;margin-bottom:16px"><tbody>' + mapRows + '</tbody></table>' +
      '<details style="margin-bottom:16px"><summary style="font-size:12px;color:var(--text-muted);cursor:pointer">Preview first ' + Math.min(5,rows.length) + ' rows</summary>' +
        '<div style="overflow-x:auto;margin-top:8px"><table style="border-collapse:collapse;font-size:11px">' +
          '<thead><tr>' + headers.map(h => '<th style="padding:2px 6px;border-bottom:1px solid var(--border);text-align:left">' + escHtml(h) + '</th>').join('') + '</tr></thead>' +
          '<tbody>' + previewRows + '</tbody></table></div>' +
      '</details>' +
      '<div class="modal-actions">' +
        '<button class="btn" id="imp-cancel">Cancel</button>' +
        '<button class="btn btn-primary" id="imp-confirm">Import ' + rows.length + ' entries</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('imp-cancel').addEventListener('click', () => overlay.remove());

  document.getElementById('imp-confirm').addEventListener('click', () => {
    const m = {};
    overlay.querySelectorAll('select[data-field]').forEach(sel => { m[sel.dataset.field] = parseInt(sel.value); });
    const get = (row, idx) => (idx >= 0 && idx < row.length) ? (row[idx]||'').trim() : '';

    const imported = rows.map(row => {
      const statusRaw = get(row, m.transcript).toLowerCase();
      return {
        id: uid(), created: new Date().toISOString(), modified: new Date().toISOString(),
        title:        get(row, m.title)    || 'Untitled',
        type:         mapCsvType(get(row, m.type)),
        dateFrom:     parseDateToMonth(get(row, m.dateFrom)),
        dateTo:       parseDateToMonth(get(row, m.dateTo)),
        cpeCount:     parseFloat(get(row, m.cpeCount)) || 0,
        presenter:    get(row, m.presenter),
        org:          get(row, m.org),
        yearPublished:'', url:'', summary: get(row, m.summary),
        proofRefs:    [],
        transcript:   statusRaw.includes('submit') || statusRaw.includes('approved') || statusRaw === 'yes',
        domains:      [],
      };
    });

    data.entries = data.entries.concat(imported);
    saveToLocalStorage(); setSaveStatus('dirty'); overlay.remove(); renderAll();
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.3)';
    notice.textContent = 'Imported ' + imported.length + ' entries';
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 3000);
  });
}

function setTheme(name) {
  document.documentElement.dataset.theme = name === 'light' ? '' : name;

function renderEntryList() {
  const el = document.getElementById('entry-list');
  if (!el) return;
  const q = searchQuery.toLowerCase();

  let entries = data.entries.filter(e => {
    if (q) {
      const hay = ((e.title || '') + ' ' + (e.type || '') + ' ' + (e.presenter || '') + ' ' + (e.org || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (activeFilter === 'pending') return !e.transcript;
    if (activeFilter === 'a') { const t = CPE_TYPES[e.type]; return t && t.group === 'A'; }
    if (activeFilter === 'b') { const t = CPE_TYPES[e.type]; return t && t.group === 'B'; }
    return true;
  });

  entries.sort((a, b) => {
    const da = a.dateFrom || a.created || '';
    const db = b.dateFrom || b.created || '';
    return db.localeCompare(da);
  });

  if (!entries.length) {
    el.innerHTML = '<div style="padding:16px 12px;font-size:12px;color:var(--text-muted)">No entries found.</div>';
    return;
  }

  el.innerHTML = entries.map(e => {
    const t   = CPE_TYPES[e.type];
    const grp = t ? t.group : '?';
    const cpe = parseFloat(e.cpeCount) || 0;
    const dateStr = e.dateFrom ? fmtDate(e.dateFrom) : '';
    const isActive = e.id === activeId;
    return '<div class="entry-card' + (isActive ? ' active' : '') + '" data-id="' + e.id + '">' +
      '<div class="ec-title">' + escHtml(e.title || 'Untitled') + '</div>' +
      '<div class="ec-meta">' +
        '<span class="ec-date">' + dateStr + '</span>' +
        '<span class="ec-type-badge badge-' + grp.toLowerCase() + '">' + grp + '</span>' +
        '<span class="ec-cpe">' + cpe + ' CPE' + (cpe !== 1 ? 's' : '') + '</span>' +
        '<span class="ec-xscript">' + (e.transcript ? '<span class="ic-check">\u2713</span>' : '<span class="ic-pending">\u25cb</span>') + '</span>' +
      '</div>' +
    '</div>';
  }).join('');

  el.querySelectorAll('.entry-card').forEach(card => {
    card.addEventListener('click', () => openEntry(card.dataset.id));
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Rendering: Main area ──────────────────────────────────────────────────────

function renderMain() {
  if (editMode) { renderEditForm(); return; }
  if (activeId) {
    const entry = data.entries.find(e => e.id === activeId);
    if (entry) { renderEntryView(entry); return; }
  }
  renderDashboard();
}

        '</div>' +
      '</div>' +
      '<div class="dash-card">' +
        '<div class="dash-card-title">Group Breakdown</div>' +
        '<div style="display:flex;gap:16px;margin-bottom:10px">' +
          '<div><div style="font-size:11px;color:var(--group-a);font-weight:600">GROUP A</div>' +
            '<div style="font-size:22px;font-weight:700;color:var(--group-a)">' + s.totalA.toFixed(s.totalA % 1 ? 1 : 0) + '</div>' +
            '<div style="font-size:11px;color:var(--text-muted)">CPEs</div></div>' +
          '<div><div style="font-size:11px;color:var(--group-b);font-weight:600">GROUP B</div>' +
            '<div style="font-size:22px;font-weight:700;color:var(--group-b)">' + s.totalB.toFixed(s.totalB % 1 ? 1 : 0) + '</div>' +
            '<div style="font-size:11px;color:var(--text-muted)">max ' + s.groupBMax + ' credited</div></div>' +
        '</div>' +
        '<div class="dash-sub" style="margin-bottom:4px">Group B credited: ' + s.groupBCapped.toFixed(s.groupBCapped % 1 ? 1 : 0) + ' / ' + s.groupBMax + '</div>' +
        '<div class="dash-progress-bar"><div class="dash-progress-fill' + (bPct >= 100 ? ' complete' : '') + '" style="width:' + bPct + '%"></div></div>' +
      '</div>' +
      '<div class="dash-card">' +

      '<div class="dash-card">' +
        '<div class="dash-card-title">Domain Coverage</div>' +
        '<div class="domain-grid">' + domainRows + '</div>' +
      '</div>' +
    '</div>';

function renderEntryView(entry) {
  const el = document.getElementById('main-content');
  if (!el) return;
  const t = CPE_TYPES[entry.type] || {};
  const grp = t.group || '?';
  const typeLabel = t.label || entry.type;
  const catLabel = CPE_CATEGORIES[t.category] || '';

  const domainsHtml = DOMAINS.map(d => {
    const active = (entry.domains || []).includes(d.id);
    return '<span class="domain-pill' + (active ? ' checked' : '') + '">' + escHtml(d.label) + '</span>';
  }).join('');

  const summaryHtml = entry.summary
    ? '<div class="summary-rendered">' + marked.parse(entry.summary) + '</div>'
    : '<span style="color:var(--text-muted);font-size:12px">No summary.</span>';

  const cp = (val) => '<button class="copy-btn" data-copy="' + escHtml(String(val || '')) + '">copy</button>';

  const proofRefs = entry.proofRefs || [];
  const proofHtml = proofRefs.length
    ? proofRefs.map(r => '<span class="proof-ref has-file">' + escHtml(r) + '</span>').join('')
    : '<span class="proof-ref">No proof files attached</span>';

  const startDate = entry.dateFrom ? fmtDate(entry.dateFrom) : '\u2014';
  const endDate   = entry.dateTo   ? fmtDate(entry.dateTo)   : '\u2014';
  const cpeCount  = parseFloat(entry.cpeCount) || 0;

  el.innerHTML =
    '<div class="entry-hdr">' +
      '<div class="entry-hdr-title">' + escHtml(entry.title || 'Untitled') + cp(entry.title || '') + '</div>' +
      '<div class="btn-row">' +
        '<button class="btn btn-primary" id="btn-edit-entry">Edit</button>' +
        '<button class="btn btn-danger" id="btn-delete-entry">Delete</button>' +
      '</div>' +
    '</div>' +
    '<div class="fields-grid" style="margin-bottom:16px">' +
      '<div><span class="field-label">Start Date</span><div class="field-value">' + startDate + cp(startDate) + '</div></div>' +
      '<div><span class="field-label">End Date</span><div class="field-value">' + endDate + cp(endDate) + '</div></div>' +
      '<div class="field-full"><span class="field-label">Category</span><div class="field-value">' + escHtml(catLabel) + cp(catLabel) + '</div></div>' +
      '<div class="field-full"><span class="field-label">Type</span><div class="field-value">' + escHtml(typeLabel) + cp(typeLabel) + '</div></div>' +
      (entry.presenter ? '<div><span class="field-label">Presenter / Instructor</span><div class="field-value">' + escHtml(entry.presenter) + cp(entry.presenter) + '</div></div>' : '') +
      (entry.org       ? '<div><span class="field-label">Organization</span><div class="field-value">' + escHtml(entry.org) + cp(entry.org) + '</div></div>' : '') +
      (entry.yearPublished ? '<div><span class="field-label">Year Published</span><div class="field-value">' + escHtml(String(entry.yearPublished)) + cp(String(entry.yearPublished)) + '</div></div>' : '') +
      '<div><span class="field-label">CPE Credits</span><div class="field-value" style="font-weight:700;color:var(--accent)">' + cpeCount + cp(String(cpeCount)) + '</div></div>' +
      (entry.url ? '<div class="field-full"><span class="field-label">URL</span><div class="field-value"><a href="' + escHtml(entry.url) + '" target="_blank" rel="noopener">' + escHtml(entry.url) + '</a>' + cp(entry.url) + '</div></div>' : '') +
      '<div class="field-full" style="padding-top:4px"><span class="view-badge grp-' + grp.toLowerCase() + '">Group ' + grp + '</span></div>' +
    '</div>' +
    '<div class="summary-section">' +
      '<span class="field-label">Description ' + cp(entry.summary || '') + '</span>' + summaryHtml +
    '</div>' +
    '<div class="proof-section">' +
      '<span class="field-label">Supporting Documentation</span>' +
      '<div class="proof-row" style="flex-wrap:wrap;gap:6px">' + proofHtml + '</div>' +
    '</div>' +
    '<div class="domains-section">' +
      '<span class="field-label">CISSP Domains</span>' +
      '<div class="domain-pills">' + domainsHtml + '</div>' +
    '</div>' +
    '<div class="transcript-section' + (entry.transcript ? ' done' : '') + '">' +
      '<span class="transcript-label">' +
        (entry.transcript
          ? '\u2705 <span class="xscript-text done">Added to official ISC\u00b2 transcript</span>'
          : '\u25cb <span class="xscript-text">Not yet added to ISC\u00b2 transcript</span>') +
      '</span>' +
    '</div>';

  document.getElementById('btn-edit-entry').addEventListener('click', () => { editMode = true; isNewEntry = false; renderEditForm(); });
  document.getElementById('btn-delete-entry').addEventListener('click', () => deleteEntry(entry.id));

  el.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.copy;
      const flash = () => {
        const orig = btn.textContent;
        btn.textContent = '\u2713'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(flash).catch(() => { fallbackCopy(text); flash(); });
      } else { fallbackCopy(text); flash(); }
    });
  });
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
}

function renderEditForm() {
  const el = document.getElementById('main-content');
  if (!el) return;

  const entry = isNewEntry ? null : data.entries.find(e => e.id === activeId);
  const cm    = currentMonth();
  const v     = entry || { type: 'online_webinar', dateFrom: cm, dateTo: cm, cpeCount: 1, proofRefs: [] };
  const existingRefs = v.proofRefs || [];

  const currentCategory = (v.type && CPE_TYPES[v.type]) ? CPE_TYPES[v.type].category : 'education';

  const catOpts = Object.entries(CPE_CATEGORIES).map(([k, label]) =>
    '<option value="' + k + '"' + (k === currentCategory ? ' selected' : '') + '>' + escHtml(label) + '</option>'
  ).join('');

  const typeOpts = Object.entries(CPE_TYPES)
    .filter(([k, t]) => t.category === currentCategory)
    .map(([k, t]) => '<option value="' + k + '"' + (v.type === k ? ' selected' : '') + '>' + escHtml(t.label) + '</option>')
    .join('');

  const domainPills = DOMAINS.map(d => {
    const checked = (v.domains || []).includes(d.id);
    return '<label class="domain-pill' + (checked ? ' checked' : '') + '" data-domain="' + d.id + '">' +
      '<input type="checkbox" value="' + d.id + '"' + (checked ? ' checked' : '') + '>' +
      escHtml(d.label) +
    '</label>';
  }).join('');

  const proofItemsHtml = existingRefs.map(r =>
    '<span class="proof-ref-item has-file" data-name="' + escHtml(r) + '">' +
      escHtml(r) + ' <button class="proof-ref-remove" title="Remove">\u00d7</button>' +
    '</span>'
  ).join('');

  el.innerHTML =
    '<div class="entry-hdr">' +
      '<div class="entry-hdr-title"><input type="text" id="f-title" placeholder="Entry title..." value="' + escHtml(v.title || '') + '"></div>' +
      '<div class="btn-row">' +
        '<button class="btn btn-primary" id="btn-save-entry">Save Entry</button>' +
        '<button class="btn" id="btn-cancel-edit">Cancel</button>' +
        (!isNewEntry ? '<button class="btn btn-danger" id="btn-delete-edit">Delete</button>' : '') +
      '</div>' +
    '</div>' +
    '<div class="fields-grid">' +
      '<div><label class="field-label">Start Date</label>' +
        '<input type="date" class="field-input" id="f-date-from" value="' + (v.dateFrom || '') + '"></div>' +
      '<div><label class="field-label">End Date</label>' +
        '<input type="date" class="field-input" id="f-date-to" value="' + (v.dateTo || '') + '"></div>' +
      '<div class="field-full"><label class="field-label">Category</label>' +
        '<select class="field-input" id="f-category">' + catOpts + '</select></div>' +
      '<div class="field-full"><label class="field-label">Type</label>' +
        '<select class="field-input" id="f-type">' + typeOpts + '</select></div>' +
      '<div id="f-presenter-wrap"><label class="field-label">Presenter / Instructor</label>' +
        '<input type="text" class="field-input" id="f-presenter" value="' + escHtml(v.presenter || '') + '"></div>' +
      '<div id="f-org-wrap"><label class="field-label">Organization / Publisher</label>' +
        '<input type="text" class="field-input" id="f-org" value="' + escHtml(v.org || '') + '"></div>' +
      '<div id="f-year-wrap"><label class="field-label">Year Published</label>' +
        '<input type="number" class="field-input" id="f-year" min="1990" max="2099" value="' + (v.yearPublished || '') + '"></div>' +
      '<div id="f-url-wrap"><label class="field-label">URL (optional)</label>' +
        '<input type="url" class="field-input" id="f-url" placeholder="https://..." value="' + escHtml(v.url || '') + '"></div>' +
      '<div><label class="field-label">CPE Credits</label>' +
        '<input type="number" class="field-input" id="f-cpe" min="0" step="0.5" value="' + (v.cpeCount || '') + '"></div>' +
    '</div>' +
    '<div class="summary-section">' +
      '<span class="field-label">Summary (Markdown supported)</span>' +
      '<textarea id="f-summary" placeholder="Describe what was covered...">' + escHtml(v.summary || '') + '</textarea>' +
    '</div>' +
    '<div class="proof-section">' +
      '<span class="field-label">Proof Files</span>' +
      '<input type="hidden" id="proof-refs-hidden" value="' + escHtml(JSON.stringify(existingRefs)) + '">' +
      '<div id="proof-refs-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">' + proofItemsHtml + '</div>' +
      '<div class="proof-row">' +
        '<button class="btn" id="btn-attach-proof">Attach File\u2026</button>' +
        '<span style="font-size:11px;color:var(--text-muted);margin-left:8px">or paste screenshots (Ctrl+V / Cmd+V) anywhere on the page</span>' +
      '</div>' +
      '<div id="paste-hint" style="margin-top:6px;font-size:11px;color:var(--text-muted);font-style:italic"></div>' +
    '</div>' +
    '<div class="domains-section">' +
      '<span class="field-label">CISSP Domains Covered</span>' +
      '<div class="domain-pills" id="domain-pills-edit">' + domainPills + '</div>' +
    '</div>' +
    '<div class="transcript-section' + (v.transcript ? ' done' : '') + '" id="transcript-section">' +
      '<label class="transcript-label">' +
        '<input type="checkbox" id="f-transcript"' + (v.transcript ? ' checked' : '') + '>' +
        '<span class="xscript-text' + (v.transcript ? ' done' : '') + '" id="xscript-text-label">' +
          (v.transcript ? 'Added to official ISC\u00b2 transcript' : 'Add to official ISC\u00b2 transcript') +
        '</span>' +
      '</label>' +
    '</div>';

  updateConditionalFields();
  document.getElementById('f-category').addEventListener('change', updateTypeDropdown);
  document.getElementById('f-type').addEventListener('change', updateConditionalFields);

  // Domain pill toggles
  document.querySelectorAll('#domain-pills-edit .domain-pill').forEach(pill => {
    const cb = pill.querySelector('input[type="checkbox"]');
    cb.addEventListener('change', () => pill.classList.toggle('checked', cb.checked));
  });

  // Transcript toggle
  const xscriptCb = document.getElementById('f-transcript');
  const xscriptSec = document.getElementById('transcript-section');
  const xscriptLbl = document.getElementById('xscript-text-label');
  xscriptCb.addEventListener('change', () => {
    const done = xscriptCb.checked;
    xscriptSec.classList.toggle('done', done);
    xscriptLbl.classList.toggle('done', done);
    xscriptLbl.textContent = done ? 'Added to official ISC\u00b2 transcript' : 'Add to official ISC\u00b2 transcript';
  });

  // Wire existing remove buttons
  document.querySelectorAll('.proof-ref-item .proof-ref-remove').forEach(btn => {
    btn.addEventListener('click', () => { btn.closest('.proof-ref-item').remove(); updateProofRefsHidden(); });
  });

  document.getElementById('btn-attach-proof').addEventListener('click', () => attachProofFile(collectFormData()));
  document.getElementById('btn-save-entry').addEventListener('click', () => collectFormAndSave(true));
  document.getElementById('btn-cancel-edit').addEventListener('click', cancelEdit);
  if (!isNewEntry) {
    document.getElementById('btn-delete-edit').addEventListener('click', () => deleteEntry(activeId));
  }
}

function updateTypeDropdown() {
  const catEl  = document.getElementById('f-category');
  const typeEl = document.getElementById('f-type');
  if (!catEl || !typeEl) return;
  const cat = catEl.value;
  const prevType = typeEl.value;
  typeEl.innerHTML = Object.entries(CPE_TYPES)
    .filter(([k, t]) => t.category === cat)
    .map(([k, t]) => '<option value="' + k + '">' + escHtml(t.label) + '</option>')
    .join('');
  if (CPE_TYPES[prevType] && CPE_TYPES[prevType].category === cat) typeEl.value = prevType;
  updateConditionalFields();
}

function updateConditionalFields() {
  const typeVal = (document.getElementById('f-type') || {}).value;
  const t = CPE_TYPES[typeVal] || {};
  const setVis = (id, show) => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('field-hidden', !show);
  };
  setVis('f-presenter-wrap', !!t.showPresenter);
  setVis('f-org-wrap',       !!t.showOrg);
  setVis('f-year-wrap',      !!t.showYear);
  setVis('f-url-wrap',       !!t.showUrl);
}

function collectFormData() {
  const domains = [];
  document.querySelectorAll('#domain-pills-edit input[type="checkbox"]:checked').forEach(cb => domains.push(cb.value));
  let proofRefs = [];
  try {
    const hiddenEl = document.getElementById('proof-refs-hidden');
    if (hiddenEl) proofRefs = JSON.parse(hiddenEl.value) || [];
  } catch(e) {}
  return {
    title:         (document.getElementById('f-title')     || {}).value.trim() || '',
    type:          (document.getElementById('f-type')      || {}).value || 'webinar',
    dateFrom:      (document.getElementById('f-date-from') || {}).value || '',
    dateTo:        (document.getElementById('f-date-to')   || {}).value || '',
    cpeCount:      parseFloat((document.getElementById('f-cpe') || {}).value) || 0,
    presenter:     (document.getElementById('f-presenter') || {}).value.trim() || '',
    org:           (document.getElementById('f-org')       || {}).value.trim() || '',
    yearPublished: (document.getElementById('f-year')      || {}).value || '',
    url:           (document.getElementById('f-url')       || {}).value.trim() || '',
    summary:       (document.getElementById('f-summary')   || {}).value.trim() || '',
    proofRefs:     proofRefs,
    transcript:    !!(document.getElementById('f-transcript') || {}).checked,
    domains:       domains,
  };
}

function validateEntry(formData) {
  if (!formData.title) {
    alert('Please enter a title for this CPE entry.');
    document.getElementById('f-title')?.focus();
    return false;
  }
  if (!formData.dateFrom) {
    alert('Please select a start date for this entry.');
    document.getElementById('f-date-from')?.focus();
    return false;
  }
  if (formData.dateTo && formData.dateTo < formData.dateFrom) {
    alert('The end date cannot be before the start date.');
    document.getElementById('f-date-to')?.focus();
    return false;
  }
  if (!(formData.cpeCount > 0)) {
    alert('Please enter a CPE credit value greater than zero.');
    document.getElementById('f-cpe')?.focus();
    return false;
  }
  return true;
}

function collectFormAndSave(exitEdit) {
  const formData = collectFormData();
  if (!validateEntry(formData)) return false;
  const now = new Date().toISOString();

  if (isNewEntry) {
    const newEntry = { id: uid(), created: now, modified: now, ...formData };
    data.entries.push(newEntry);
    activeId = newEntry.id;
  } else {
    const idx = data.entries.findIndex(e => e.id === activeId);
    if (idx >= 0) data.entries[idx] = { ...data.entries[idx], ...formData, modified: now };
  }

  saveToLocalStorage();
  setSaveStatus('dirty');

  if (exitEdit) { editMode = false; isNewEntry = false; }
  renderAll();
  return true;
}

function cancelEdit() {
  editMode = false;
  isNewEntry = false;
  renderMain();
}

// ── Entry actions ─────────────────────────────────────────────────────────────

function openEntry(id) {
  if (editMode && !confirm('Discard unsaved changes?')) return;
  editMode = false; isNewEntry = false;
  activeId = id;
  renderEntryList();
  renderMain();
}

function newEntry() {
  activeId = null; editMode = true; isNewEntry = true;
  renderEntryList();
  renderMain();
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  data.entries = data.entries.filter(e => e.id !== id);
  if (activeId === id) activeId = null;
  editMode = false; isNewEntry = false;
  saveToLocalStorage();
  setSaveStatus('dirty');
  renderAll();
}

// ── Settings modal ────────────────────────────────────────────────────────────

function showSettingsModal() {
  const overlay = document.createElement('div');
  overlay.className = 'settings-modal-overlay';
  overlay.innerHTML =
    '<div class="settings-modal">' +
      '<h2>Cycle Settings</h2>' +
      '<div class="form-field"><label>Cycle Start (month)</label>' +
        '<input type="month" id="sm-cycle-start" value="' + (data.settings.cycleStart || '') + '"></div>' +
      '<div class="form-field"><label>CPE Goal (total for cycle)</label>' +
        '<input type="number" id="sm-goal" value="' + (data.settings.cpeGoal || 120) + '" min="1"></div>' +
      '<div class="form-field"><label>Group B Max Credits</label>' +
        '<input type="number" id="sm-group-b-max" value="' + (data.settings.groupBMax || 30) + '" min="1"></div>' +
      '<p style="font-size:11px;color:var(--text-muted);margin-top:8px">Cycle end is auto-calculated as 36 months after start (e.g. Jul 2024 \u2192 Jun 2027).</p>' +
      '<div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border)">' +
        '<p style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Share a blank copy with someone else:</p>' +
        '<button class="btn btn-danger" id="sm-reset">Clear all entries &amp; reset\u2026</button>' +
      '</div>' +
      '<div class="modal-actions">' +
        '<button class="btn" id="sm-cancel">Cancel</button>' +
        '<button class="btn btn-primary" id="sm-save">Save</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  document.getElementById('sm-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('sm-save').addEventListener('click', () => {
    data.settings.cycleStart = document.getElementById('sm-cycle-start').value || '';
    data.settings.cpeGoal    = parseInt(document.getElementById('sm-goal').value) || 120;
    data.settings.groupBMax  = parseInt(document.getElementById('sm-group-b-max').value) || 30;
    saveToLocalStorage();
    setSaveStatus('dirty');
    overlay.remove();
    renderAll();
  });
  document.getElementById('sm-reset').addEventListener('click', () => {
    if (!confirm('Delete ALL entries and reset settings? This cannot be undone.\n\nSave the file after resetting to share a blank copy.')) return;
    data.entries = [];
    data.settings = { cycleStart: '', cpeGoal: 120, groupBMax: 30 };
    activeId = null; editMode = false; isNewEntry = false;
    saveToLocalStorage();
    setSaveStatus('dirty');
    overlay.remove();
    renderAll();
  });
}

// ── Full render ───────────────────────────────────────────────────────────────

function renderAll() {
  renderCycleStats();
  renderEntryList();
  renderMain();
}

// ── Wire events ───────────────────────────────────────────────────────────────

function wireEvents() {
  document.getElementById('btn-new').addEventListener('click', newEntry);
  document.getElementById('btn-save-hdr').addEventListener('click', () => saveOrDownload().catch(err => console.error(err)));

  // Import button — guard against duplicate injection (outerHTML fallback bakes it into saved HTML)
  if (!document.getElementById('btn-import')) {
    const importBtn = document.createElement('button');
    importBtn.id = 'btn-import';
    importBtn.title = 'Import ISC² transcript (PDF or CSV)';
    importBtn.textContent = 'Import';
    importBtn.style.cssText = 'font-size:11px;padding:3px 8px;background:var(--bg-ctrl);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0';
    importBtn.addEventListener('mouseover', () => { importBtn.style.background = 'var(--bg-hover)'; });
    importBtn.addEventListener('mouseout',  () => { importBtn.style.background = 'var(--bg-ctrl)'; });
    importBtn.addEventListener('click', showImportModal);
    const hdr = document.getElementById('sidebar-hdr');
    if (hdr) hdr.insertBefore(importBtn, document.getElementById('btn-save-hdr'));
  } else {
    document.getElementById('btn-import').addEventListener('click', showImportModal);
  }

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderEntryList();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderEntryList();
    });
  });

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => setTheme(btn.dataset.theme));
  });

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveOrDownload().catch(err => console.error(err));
    }
  });

  // Paste image handler (active only when edit form is open)
  document.addEventListener('paste', handlePaste);

  window.addEventListener('beforeunload', e => {
    if (isDirty) { e.preventDefault(); e.returnValue = ''; }
  });
}

// ── Update check ───────────────────────────────────────────────────────────────
async function checkForUpdates() {
  const btn = document.getElementById('update-check-btn');
  const orig = btn.textContent;
  btn.textContent = 'Checking…';
  btn.disabled = true;
  try {
    const res = await fetch(GITHUB_RAW);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const m = text.match(/APP_VERSION = '([^']+)'/);
    if (!m) throw new Error('Version string not found');
    if (m[1] === APP_VERSION) {
      alert('You are up to date (v' + APP_VERSION + ').');
    } else if (confirm('Update available: v' + m[1] + ' (you have v' + APP_VERSION + ').\n\nDownload now?')) {
      window.open(GITHUB_RAW, '_blank');
    }
  } catch(e) {
    alert('Update check failed: ' + e.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

async function bootstrap() {
  loadData();
  const savedTheme = localStorage.getItem(LS_THEME) || 'light';
  setTheme(savedTheme);
  wireEvents();
  renderAll();
  await cacheOriginalHtml();
}

bootstrap();
</script>
